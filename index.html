<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad safe zone checker</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius: 8px;
    --radius-lg: 12px;
    --accent: #1D9E75;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2a2a2a;
      --text-primary: #e8e8e8;
      --text-secondary: #aaa;
      --text-tertiary: #777;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .wrap { max-width: 720px; width: 100%; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.25rem; }
  button {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 14px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    height: 4px; background: var(--border); border-radius: 2px; outline: none; flex: 1;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
    background: var(--text-primary); cursor: pointer; border: 2px solid var(--bg-primary);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--text-primary); cursor: pointer; border: 2px solid var(--bg-primary);
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Ad safe zone checker</h1>

  <div id="chips" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;"></div>

  <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;">

    <div style="flex:0 0 auto;">
      <div id="drop" style="position:relative;width:300px;height:533px;background:var(--bg-secondary);border:1px dashed var(--border-hover);border-radius:var(--radius-lg);overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;">
        <div id="placeholder" style="text-align:center;color:var(--text-tertiary);padding:0 24px;pointer-events:none;">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          <p style="font-size:13px;margin:10px 0 0;line-height:1.5;">Drop a vertical photo or video here, or click to choose.<br>9:16 works best.</p>
        </div>
        <img id="media-img" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;" alt="uploaded preview" />
        <video id="media-vid" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;" muted loop playsinline></video>
        <div id="overlay" style="position:absolute;inset:0;pointer-events:none;"></div>
      </div>
      <input id="file" type="file" accept="image/*,video/*" style="display:none;" />

      <div id="player" style="display:none;margin-top:10px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span id="t-cur" style="font-size:12px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;min-width:34px;">0:00</span>
          <input id="seek" type="range" min="0" max="1000" value="0" step="1" aria-label="Seek" />
          <span id="t-dur" style="font-size:12px;color:var(--text-tertiary);font-variant-numeric:tabular-nums;min-width:34px;text-align:right;">0:00</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:8px;">
          <button id="btn-back" title="Step back 1 frame" style="padding:6px 9px;">&#8249;</button>
          <button id="btn-play" title="Play / pause" style="padding:6px 11px;">&#9646;&#9646;</button>
          <button id="btn-fwd" title="Step forward 1 frame" style="padding:6px 9px;">&#8250;</button>
          <div style="margin-left:auto;display:flex;align-items:center;gap:2px;" id="speeds"></div>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:10px;">
        <button id="btn-upload" style="flex:1;">Choose file</button>
        <button id="btn-fit"><span id="fit-label">Fill</span></button>
      </div>
    </div>

    <div style="flex:1;min-width:230px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <label style="font-size:13px;color:var(--text-secondary);">Dim unsafe area</label>
        <input id="dim" type="range" min="0" max="60" value="32" step="1" />
      </div>
      <div style="background:var(--bg-secondary);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;">
        Pick one or more platforms above. The <span style="color:#1D9E75;font-weight:500;">green box</span> is the area safe across everything you've selected — keep your text, logos, and faces inside it.
      </div>
      <div id="legend" style="display:flex;flex-direction:column;gap:6px;font-size:13px;"></div>
    </div>

  </div>
</div>

<script>
(function(){
  var PRESETS = [
    {id:'meta',   label:'Meta Reels / Stories', color:'#378ADD', top:14, bottom:20, left:6,  right:6,  on:true},
    {id:'tiktok', label:'TikTok',               color:'#D4537E', top:6,  bottom:22, left:6,  right:11, on:true},
    {id:'shorts', label:'YouTube Shorts',       color:'#E24B4A', top:9,  bottom:18, left:4,  right:11, on:false},
    {id:'snap',   label:'Snapchat',             color:'#BA7517', top:11, bottom:10, left:6,  right:6,  on:false}
  ];
  var SPEEDS=[0.25,0.5,1,1.5,2];
  var fitCover=true, curSpeed=1, seeking=false;

  var drop=document.getElementById('drop'), file=document.getElementById('file'),
      img=document.getElementById('media-img'), vid=document.getElementById('media-vid'),
      ph=document.getElementById('placeholder'), overlay=document.getElementById('overlay'),
      chips=document.getElementById('chips'), legend=document.getElementById('legend'),
      dim=document.getElementById('dim'), player=document.getElementById('player'),
      seek=document.getElementById('seek'), tcur=document.getElementById('t-cur'),
      tdur=document.getElementById('t-dur'), speeds=document.getElementById('speeds'),
      btnPlay=document.getElementById('btn-play'), fitLabel=document.getElementById('fit-label');

  function enabled(){ return PRESETS.filter(function(p){return p.on;}); }
  function fmt(s){ if(!isFinite(s)) return '0:00'; var m=Math.floor(s/60), x=Math.floor(s%60); return m+':'+(x<10?'0':'')+x; }

  function render(){
    overlay.innerHTML='';
    var on=enabled(), a=parseInt(dim.value,10)/100;
    on.forEach(function(p){
      var d=document.createElement('div');
      d.style.cssText='position:absolute;top:'+p.top+'%;bottom:'+p.bottom+'%;left:'+p.left+'%;right:'+p.right+'%;border:1.5px dashed '+p.color+';border-radius:2px;';
      overlay.appendChild(d);
    });
    if(on.length){
      var top=Math.max.apply(null,on.map(function(p){return p.top;}));
      var bottom=Math.max.apply(null,on.map(function(p){return p.bottom;}));
      var left=Math.max.apply(null,on.map(function(p){return p.left;}));
      var right=Math.max.apply(null,on.map(function(p){return p.right;}));
      var safe=document.createElement('div');
      safe.style.cssText='position:absolute;top:'+top+'%;bottom:'+bottom+'%;left:'+left+'%;right:'+right+'%;border:2px solid #1D9E75;border-radius:3px;box-shadow:0 0 0 9999px rgba(226,75,74,'+a+');';
      overlay.appendChild(safe);
    }
    legend.innerHTML='';
    on.forEach(function(p){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:8px;';
      row.innerHTML='<span style="width:18px;height:0;border-top:2px dashed '+p.color+';display:inline-block;"></span><span style="color:var(--text-secondary)">'+p.label+'</span><span style="margin-left:auto;color:var(--text-tertiary);font-size:12px;">top '+p.top+'% · btm '+p.bottom+'% · sides '+p.left+'/'+p.right+'%</span>';
      legend.appendChild(row);
    });
    if(on.length>1){
      var v=document.createElement('div');
      v.style.cssText='display:flex;align-items:center;gap:8px;margin-top:2px;padding-top:6px;border-top:0.5px solid var(--border);';
      v.innerHTML='<span style="width:18px;height:0;border-top:2px solid #1D9E75;display:inline-block;"></span><span style="color:#1D9E75;font-weight:500;">Combined safe zone (strictest)</span>';
      legend.appendChild(v);
    }
  }

  function renderChips(){
    chips.innerHTML='';
    PRESETS.forEach(function(p){
      var b=document.createElement('button');
      b.textContent=p.label;
      b.style.cssText='padding:5px 12px;font-size:13px;border-radius:999px;border:0.5px solid '+(p.on?p.color:'var(--border-hover)')+';background:'+(p.on?p.color+'22':'transparent')+';color:'+(p.on?'var(--text-primary)':'var(--text-secondary)')+';';
      b.onclick=function(){ p.on=!p.on; renderChips(); render(); };
      chips.appendChild(b);
    });
  }

  function renderSpeeds(){
    speeds.innerHTML='';
    SPEEDS.forEach(function(s){
      var b=document.createElement('button');
      b.textContent=(s===1?'1':s)+'×';
      var act=s===curSpeed;
      b.style.cssText='padding:5px 7px;font-size:12px;font-variant-numeric:tabular-nums;border-radius:var(--radius);border:0.5px solid '+(act?'#378ADD':'var(--border)')+';background:'+(act?'#378ADD22':'transparent')+';color:'+(act?'#378ADD':'var(--text-secondary)')+';';
      b.onclick=function(){ curSpeed=s; vid.playbackRate=s; renderSpeeds(); };
      speeds.appendChild(b);
    });
  }

  function setPlayIcon(){ btnPlay.innerHTML=vid.paused?'&#9654;':'&#9646;&#9646;'; }

  function loadFile(f){
    if(!f) return;
    var url=URL.createObjectURL(f);
    ph.style.display='none';
    if(f.type.indexOf('video')===0){
      img.style.display='none';
      vid.src=url; vid.style.display='block'; vid.playbackRate=curSpeed;
      player.style.display='block';
      vid.play().then(setPlayIcon).catch(setPlayIcon);
    } else {
      vid.pause(); vid.removeAttribute('src'); vid.load(); vid.style.display='none';
      player.style.display='none';
      img.src=url; img.style.display='block';
    }
  }

  drop.onclick=function(){ file.click(); };
  document.getElementById('btn-upload').onclick=function(e){ e.stopPropagation(); file.click(); };
  file.onchange=function(){ loadFile(file.files[0]); };
  drop.ondragover=function(e){ e.preventDefault(); drop.style.borderColor='#378ADD'; };
  drop.ondragleave=function(){ drop.style.borderColor='var(--border-hover)'; };
  drop.ondrop=function(e){ e.preventDefault(); drop.style.borderColor='var(--border-hover)'; loadFile(e.dataTransfer.files[0]); };

  document.getElementById('btn-fit').onclick=function(){
    fitCover=!fitCover;
    var v=fitCover?'cover':'contain';
    img.style.objectFit=v; vid.style.objectFit=v;
    fitLabel.textContent=fitCover?'Fill':'Fit';
  };

  btnPlay.onclick=function(){ if(vid.paused) vid.play(); else vid.pause(); setPlayIcon(); };
  document.getElementById('btn-back').onclick=function(){ vid.pause(); vid.currentTime=Math.max(0,vid.currentTime-1/30); setPlayIcon(); };
  document.getElementById('btn-fwd').onclick=function(){ vid.pause(); vid.currentTime=Math.min(vid.duration||0,vid.currentTime+1/30); setPlayIcon(); };

  vid.onloadedmetadata=function(){ tdur.textContent=fmt(vid.duration); };
  vid.ontimeupdate=function(){
    if(seeking||!vid.duration) return;
    seek.value=Math.round(vid.currentTime/vid.duration*1000);
    tcur.textContent=fmt(vid.currentTime);
  };
  vid.onplay=setPlayIcon; vid.onpause=setPlayIcon;
  seek.oninput=function(){
    if(!vid.duration) return;
    seeking=true;
    var t=seek.value/1000*vid.duration;
    vid.currentTime=t; tcur.textContent=fmt(t);
  };
  seek.onchange=function(){ seeking=false; };

  document.addEventListener('keydown',function(e){
    if(vid.style.display==='none') return;
    if(e.key==='ArrowLeft'){ vid.pause(); vid.currentTime=Math.max(0,vid.currentTime-1/30); setPlayIcon(); e.preventDefault(); }
    if(e.key==='ArrowRight'){ vid.pause(); vid.currentTime=Math.min(vid.duration||0,vid.currentTime+1/30); setPlayIcon(); e.preventDefault(); }
    if(e.key===' '){ e.preventDefault(); if(vid.paused) vid.play(); else vid.pause(); setPlayIcon(); }
  });

  dim.oninput=render;
  renderChips(); renderSpeeds(); render();
})();
</script>
</body>
</html>
