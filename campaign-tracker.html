<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Influencer Campaign Tracker</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f0;
    --bg-card: #ffffff;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --text-tertiary: #999;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --radius: 8px;
    --radius-lg: 12px;
    --accent: #1D9E75;
    --blue: #378ADD;
    --red: #E24B4A;
    --amber: #BA7517;
    --pink: #D4537E;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #242420;
      --bg-card: #2a2a2a;
      --text-primary: #e8e8e8;
      --text-secondary: #aaa;
      --text-tertiary: #777;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 1.5rem 1rem 4rem;
  }
  .wrap { max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; }
  h2 { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
  h3 { font-size: 14px; font-weight: 600; }
  button {
    background: transparent;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius);
    color: var(--text-primary);
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.15s;
    font-family: inherit;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { background: #178a65; }
  button.danger-ghost { color: var(--red); border-color: transparent; padding: 4px 8px; }
  button.danger-ghost:hover { background: rgba(226,75,74,0.1); }
  input, select, textarea {
    font-family: inherit;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--bg-primary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 9px;
    outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--blue); }
  input[type=date] { min-width: 130px; }
  textarea { width: 100%; resize: vertical; line-height: 1.55; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th { text-align: left; font-weight: 500; color: var(--text-tertiary); font-size: 12px; padding: 6px 8px; border-bottom: 0.5px solid var(--border); }
  td { padding: 6px 8px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px;
    box-shadow: var(--shadow);
  }
  .topbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .topbar .spacer { margin-left: auto; }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .kpi { background: var(--bg-card); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 12px 14px; box-shadow: var(--shadow); }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-tertiary); margin-bottom: 4px; }
  .kpi .value { font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .kpi .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 760px) { .grid2 { grid-template-columns: 1fr; } }
  .bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; min-width: 70px; }
  .bar > div { height: 100%; border-radius: 3px; background: var(--accent); }
  .bar.over > div { background: var(--red); }
  .pill { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 500; white-space: nowrap; }
  .pill.planning { background: rgba(55,138,221,0.15); color: var(--blue); }
  .pill.active   { background: rgba(29,158,117,0.15); color: var(--accent); }
  .pill.wrapping { background: rgba(186,117,23,0.15); color: var(--amber); }
  .pill.complete { background: rgba(153,153,153,0.18); color: var(--text-secondary); }
  .pill.overdue  { background: rgba(226,75,74,0.15); color: var(--red); }
  .pill.soon     { background: rgba(186,117,23,0.15); color: var(--amber); }
  .pill.ok       { background: rgba(29,158,117,0.15); color: var(--accent); }
  .pill.done     { background: rgba(153,153,153,0.18); color: var(--text-secondary); }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .tabs button { border-radius: 999px; padding: 5px 14px; font-size: 13px; color: var(--text-secondary); }
  .tabs button.on { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
  .crow { cursor: pointer; }
  .crow:hover td { background: var(--bg-secondary); }
  .muted { color: var(--text-tertiary); }
  .small { font-size: 12px; }
  .money { font-variant-numeric: tabular-nums; white-space: nowrap; }
  .neg { color: var(--red); }
  .pos { color: var(--accent); }
  .dl-card { border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; background: var(--bg-primary); overflow: hidden; }
  .dl-head { display: flex; align-items: center; gap: 8px; padding: 10px 12px; cursor: pointer; flex-wrap: wrap; }
  .dl-head:hover { background: var(--bg-secondary); }
  .dl-body { border-top: 0.5px solid var(--border); padding: 12px; }
  .ctabs { display: flex; gap: 6px; margin: 12px 0 8px; }
  .ctabs button { font-size: 12px; border-radius: 999px; padding: 4px 11px; color: var(--text-secondary); }
  .ctabs button.on.brand    { background: rgba(55,138,221,0.15); color: var(--blue); border-color: var(--blue); }
  .ctabs button.on.creator  { background: rgba(212,83,126,0.15); color: var(--pink); border-color: var(--pink); }
  .ctabs button.on.internal { background: rgba(186,117,23,0.15); color: var(--amber); border-color: var(--amber); }
  .comment { padding: 8px 10px; border-radius: var(--radius); background: var(--bg-secondary); margin-bottom: 6px; font-size: 13px; }
  .comment .meta { font-size: 11px; color: var(--text-tertiary); margin-bottom: 3px; display: flex; gap: 8px; align-items: baseline; }
  .comment .meta .who { font-weight: 600; color: var(--text-secondary); }
  .tl-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 0.5px solid var(--border); }
  .tl-item:last-child { border-bottom: none; }
  .tl-date { font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums; min-width: 86px; }
  .quickchips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .quickchips button { font-size: 12px; border-radius: 999px; padding: 3px 10px; color: var(--text-secondary); }
  .empty { color: var(--text-tertiary); font-size: 13px; padding: 14px 4px; text-align: center; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
  .modal { background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px; width: 100%; max-width: 420px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); }
  .modal h2 { margin-bottom: 14px; }
  .frow { margin-bottom: 10px; }
  .frow label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .frow input, .frow select { width: 100%; }
  .att-cell { display: flex; align-items: center; gap: 8px; }
  .section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .section-head h2 { margin-bottom: 0; }
  .section-head .spacer { margin-left: auto; }
  .inline-edit { border-color: transparent; background: transparent; }
  .inline-edit:hover { border-color: var(--border); }
  .inline-edit:focus { background: var(--bg-primary); }
  a { color: var(--blue); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<input id="import-file" type="file" accept="application/json" style="display:none;">

<script>
(function(){
'use strict';

/* ---------------- state ---------------- */

var LS_KEY = 'influencer-campaign-tracker-v1';
var COST_CATEGORIES = ['Creator fee','Production','Paid amplification','Product / shipping','Travel & flights','Agency / legal','Misc'];
var DL_STATUSES = ['Briefed','In production','In review','Revisions','Approved','Posted'];
var CAMP_STATUSES = ['Planning','Active','Wrapping up','Complete'];
var PLATFORMS = ['Instagram','TikTok','YouTube','YouTube Shorts','Snapchat','X / Twitter','Podcast','Blog','Other'];
var MILESTONE_PRESETS = ['Contract signed','Product shipped','Brief sent','Draft due','Brand review','Go-live','Usage rights start','Invoice sent','Payment due','Wrap report due'];

var state = load();
var view = { name: 'dashboard' };            // or {name:'campaign', id, tab}
var ui = { expanded: {}, commentTab: {}, modal: null };

function load(){
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) { var s = JSON.parse(raw); if (s && s.campaigns) return s; }
  } catch(e) {}
  return { campaigns: [] };
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ---------------- helpers ---------------- */

function uid(){ return Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4); }
function esc(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function num(v){ var n = parseFloat(v); return isFinite(n) ? n : 0; }
function money(n){
  var neg = n < 0; n = Math.abs(n);
  var s = '$' + n.toLocaleString('en-US', {maximumFractionDigits:0});
  return neg ? '−' + s : s;
}
function pct(n){ return isFinite(n) ? Math.round(n*100) + '%' : '—'; }
function today(){ var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function daysUntil(iso){
  if (!iso) return null;
  var a = new Date(iso + 'T00:00:00'), b = new Date(today() + 'T00:00:00');
  return Math.round((a - b) / 86400000);
}
function fmtDate(iso){
  if (!iso) return '—';
  var d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined});
}
function fmtTs(ts){
  var d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function campaign(id){ return state.campaigns.find(function(c){ return c.id === id; }); }
function totalCosts(c){ return c.costs.reduce(function(s,x){ return s + num(x.amount); }, 0); }
function profit(c){ return num(c.revenue) - totalCosts(c); }
function margin(c){ var r = num(c.revenue); return r > 0 ? profit(c)/r : NaN; }
function attainment(c){
  var ts = c.targets.filter(function(t){ return num(t.target) > 0; });
  if (!ts.length) return NaN;
  return ts.reduce(function(s,t){ return s + Math.min(num(t.actual)/num(t.target), 1); }, 0) / ts.length;
}
function deadlinePill(iso, done){
  if (done) return '<span class="pill done">done</span>';
  var d = daysUntil(iso);
  if (d === null) return '';
  if (d < 0)  return '<span class="pill overdue">' + (-d) + 'd overdue</span>';
  if (d === 0) return '<span class="pill soon">today</span>';
  if (d <= 7) return '<span class="pill soon">in ' + d + 'd</span>';
  return '<span class="pill ok">in ' + d + 'd</span>';
}
function statusPillClass(s){
  return { 'Planning':'planning', 'Active':'active', 'Wrapping up':'wrapping', 'Complete':'complete' }[s] || 'planning';
}
function options(list, selected){
  return list.map(function(o){ return '<option' + (o===selected?' selected':'') + '>' + esc(o) + '</option>'; }).join('');
}

/* every dated item across one campaign: milestones + deliverable due dates */
function timelineItems(c){
  var items = [];
  c.milestones.forEach(function(m){
    items.push({ kind:'milestone', id:m.id, title:m.title, date:m.date, done:m.done, campaign:c });
  });
  c.deliverables.forEach(function(d){
    if (d.dueDate) items.push({ kind:'deliverable', id:d.id, title:d.title + (d.creator ? ' · ' + d.creator : ''), date:d.dueDate, done:(d.status==='Posted'||d.status==='Approved'), campaign:c });
  });
  items.sort(function(a,b){ return (a.date||'9999') < (b.date||'9999') ? -1 : 1; });
  return items;
}

/* ---------------- factories ---------------- */

function newCampaign(name, brand){
  return {
    id: uid(), name: name || 'Untitled campaign', brand: brand || '', status: 'Planning',
    startDate: '', endDate: '', revenue: 0, budget: 0,
    costs: [], targets: [], deliverables: [], milestones: [], customFields: [], notes: ''
  };
}
function newDeliverable(){
  return { id: uid(), title: 'New deliverable', creator: '', platform: 'Instagram', type: '',
           status: 'Briefed', dueDate: '', link: '', comments: [] };
}

/* ---------------- sample data ---------------- */

function loadSample(){
  var c1 = newCampaign('Spring Glow Launch', 'Lumina Skincare');
  c1.status = 'Active'; c1.startDate = '2026-05-18'; c1.endDate = '2026-07-10';
  c1.revenue = 85000; c1.budget = 60000;
  c1.costs = [
    {id:uid(), label:'@maya.creates – 2 reels + stories', category:'Creator fee', amount:28000, date:'2026-05-22', notes:'50% paid on signing'},
    {id:uid(), label:'@derekfilms – 1 YouTube integration', category:'Creator fee', amount:15000, date:'2026-05-25', notes:''},
    {id:uid(), label:'PR boxes × 12 + overnight shipping', category:'Product / shipping', amount:1840, date:'2026-05-28', notes:'FedEx, tracking in notes tab'},
    {id:uid(), label:'Flight + hotel – Maya to brand shoot', category:'Travel & flights', amount:1265, date:'2026-06-02', notes:'LAX→JFK, reimbursed'},
    {id:uid(), label:'Spark Ads boost', category:'Paid amplification', amount:5000, date:'', notes:'starts at go-live'}
  ];
  c1.targets = [
    {id:uid(), metric:'Total views', target:2000000, actual:840000},
    {id:uid(), metric:'Engagements', target:90000, actual:41200},
    {id:uid(), metric:'Link clicks', target:12000, actual:4900},
    {id:uid(), metric:'Posts live', target:4, actual:2}
  ];
  var d1 = newDeliverable();
  d1.title = 'Reel #1 – morning routine'; d1.creator = '@maya.creates'; d1.platform = 'Instagram';
  d1.type = 'Reel'; d1.status = 'Posted'; d1.dueDate = '2026-06-01'; d1.link = 'https://instagram.com/p/example';
  d1.comments = [
    {id:uid(), channel:'internal', author:'Henry', text:'First cut was strong — flagged the logo timing to Maya before brand review.', ts: Date.now()-86400000*9},
    {id:uid(), channel:'brand', author:'Sasha (Lumina)', text:'Approved! Please make sure the discount code is in the first comment.', ts: Date.now()-86400000*8},
    {id:uid(), channel:'creator', author:'Maya', text:'Posted 9am PT, code pinned in comments. Story link-up goes out tomorrow.', ts: Date.now()-86400000*7}
  ];
  var d2 = newDeliverable();
  d2.title = 'Reel #2 – ingredient deep-dive'; d2.creator = '@maya.creates'; d2.platform = 'Instagram';
  d2.type = 'Reel'; d2.status = 'In review'; d2.dueDate = '2026-06-15';
  d2.comments = [
    {id:uid(), channel:'creator', author:'Maya', text:'Draft uploaded to the shared drive — two hook options, let me know which you prefer.', ts: Date.now()-86400000*2},
    {id:uid(), channel:'internal', author:'Henry', text:'I prefer hook B. Sending to Lumina with that rec.', ts: Date.now()-86400000*1}
  ];
  var d3 = newDeliverable();
  d3.title = 'YouTube integration (90s)'; d3.creator = '@derekfilms'; d3.platform = 'YouTube';
  d3.type = 'Integration'; d3.status = 'In production'; d3.dueDate = '2026-06-24';
  c1.deliverables = [d1, d2, d3];
  c1.milestones = [
    {id:uid(), title:'Contract signed', date:'2026-05-20', done:true, notes:''},
    {id:uid(), title:'Product shipped', date:'2026-05-28', done:true, notes:''},
    {id:uid(), title:'Draft due – Reel #2', date:'2026-06-13', done:false, notes:''},
    {id:uid(), title:'Go-live – YouTube', date:'2026-06-30', done:false, notes:''},
    {id:uid(), title:'Wrap report due', date:'2026-07-15', done:false, notes:''}
  ];
  c1.customFields = [
    {id:uid(), label:'Product', value:'Glow Serum 30ml + Day Cream SPF30 (launch bundle)'},
    {id:uid(), label:'Discount code', value:'MAYA20 – 20% off, expires 7/31'},
    {id:uid(), label:'Ship to (Maya)', value:'Maya R., 1442 Hyperion Ave Apt 3, Los Angeles CA 90027'},
    {id:uid(), label:'Ship to (Derek)', value:'Derek L., 88 Greenpoint Ave, Brooklyn NY 11222'},
    {id:uid(), label:'Usage rights', value:'12 months paid social, perpetuity organic'}
  ];
  c1.notes = 'Brand contact: Sasha (sasha@luminaskin.example). Payment terms net-30 from go-live. Maya prefers async feedback via comments; Derek wants one consolidated review round.';

  var c2 = newCampaign('Q3 Hydration Push', 'Volt Energy Water');
  c2.status = 'Planning'; c2.startDate = '2026-07-01'; c2.endDate = '2026-08-15';
  c2.revenue = 40000; c2.budget = 28000;
  c2.costs = [
    {id:uid(), label:'@trailtwins – 3 TikToks', category:'Creator fee', amount:18000, date:'', notes:'pending signature'},
    {id:uid(), label:'Sample cases × 6', category:'Product / shipping', amount:420, date:'', notes:''}
  ];
  c2.targets = [
    {id:uid(), metric:'Total views', target:1500000, actual:0},
    {id:uid(), metric:'Posts live', target:3, actual:0}
  ];
  var d4 = newDeliverable();
  d4.title = 'TikTok #1 – trail day'; d4.creator = '@trailtwins'; d4.platform = 'TikTok';
  d4.type = 'TikTok'; d4.status = 'Briefed'; d4.dueDate = '2026-07-14';
  c2.deliverables = [d4];
  c2.milestones = [
    {id:uid(), title:'Contract signed', date:'2026-06-20', done:false, notes:''},
    {id:uid(), title:'Brief sent', date:'2026-06-16', done:false, notes:''},
    {id:uid(), title:'Product shipped', date:'2026-06-26', done:false, notes:''}
  ];
  c2.customFields = [
    {id:uid(), label:'Flavors to feature', value:'Citrus Surge + Berry Volt (NOT the legacy lineup)'}
  ];
  c2.notes = 'Brand wants UGC-style, no studio look. Waiting on legal for the giveaway mechanics.';

  state.campaigns = state.campaigns.concat([c1, c2]);
  save(); render();
}

/* ---------------- views ---------------- */

function render(){
  var app = document.getElementById('app');
  var html = renderTopbar();
  if (view.name === 'dashboard') html += renderDashboard();
  else if (view.name === 'campaign') {
    var c = campaign(view.id);
    html += c ? renderCampaign(c) : '<div class="empty">Campaign not found.</div>';
  }
  if (ui.modal === 'new-campaign') html += renderNewCampaignModal();
  app.innerHTML = html;
  var f = app.querySelector('[data-autofocus]');
  if (f) f.focus();
}

function renderTopbar(){
  var onDash = view.name === 'dashboard';
  return '<div class="topbar">' +
    '<h1>Influencer Campaign Tracker</h1>' +
    '<button data-action="nav-dashboard"' + (onDash ? ' style="border-color:var(--accent);color:var(--accent);"' : '') + '>Dashboard</button>' +
    '<button class="primary" data-action="open-new-campaign">+ New campaign</button>' +
    '<span class="spacer"></span>' +
    '<button data-action="export" title="Download all data as JSON">Export</button>' +
    '<button data-action="import" title="Load data from a JSON export">Import</button>' +
    (state.campaigns.length === 0 ? '<button data-action="sample">Load sample data</button>' : '') +
  '</div>';
}

/* ----- dashboard ----- */

function renderDashboard(){
  var cs = state.campaigns;
  if (!cs.length) {
    return '<div class="card"><div class="empty">No campaigns yet. Create one, or load the sample data to see how everything works.<br><br>' +
      '<button class="primary" data-action="open-new-campaign">+ New campaign</button> &nbsp; ' +
      '<button data-action="sample">Load sample data</button></div></div>';
  }
  var rev = 0, spend = 0, dlDone = 0, dlTotal = 0, overdue = 0;
  var allItems = [];
  cs.forEach(function(c){
    rev += num(c.revenue); spend += totalCosts(c);
    c.deliverables.forEach(function(d){ dlTotal++; if (d.status === 'Posted') dlDone++; });
    timelineItems(c).forEach(function(it){
      allItems.push(it);
      if (!it.done && it.date && daysUntil(it.date) < 0) overdue++;
    });
  });
  var prof = rev - spend;
  var active = cs.filter(function(c){ return c.status === 'Active'; }).length;

  var html = '<div class="kpis">' +
    kpi('Campaigns', cs.length, active + ' active') +
    kpi('Revenue', money(rev), 'contracted across all') +
    kpi('Spend', money(spend), 'committed costs') +
    kpi('Profit', '<span class="' + (prof < 0 ? 'neg' : 'pos') + '">' + money(prof) + '</span>', rev > 0 ? pct(prof/rev) + ' blended margin' : '—') +
    kpi('Deliverables', dlDone + ' / ' + dlTotal, 'posted / total') +
    kpi('Overdue items', overdue ? '<span class="neg">' + overdue + '</span>' : '0', 'milestones + deliverables') +
  '</div>';

  /* campaign table */
  html += '<div class="card" style="margin-bottom:14px;overflow-x:auto;"><h2>Campaigns</h2><table><thead><tr>' +
    '<th>Campaign</th><th>Status</th><th>Dates</th><th>Revenue</th><th>Spend vs budget</th><th>Margin</th><th>Deliverables</th><th>Targets</th><th>Next deadline</th>' +
    '</tr></thead><tbody>';
  cs.forEach(function(c){
    var sp = totalCosts(c), b = num(c.budget);
    var burnPct = b > 0 ? sp/b : 0;
    var posted = c.deliverables.filter(function(d){ return d.status === 'Posted'; }).length;
    var nxt = timelineItems(c).filter(function(it){ return !it.done && it.date && daysUntil(it.date) >= 0; })[0];
    var od  = timelineItems(c).filter(function(it){ return !it.done && it.date && daysUntil(it.date) < 0; })[0];
    var m = margin(c), att = attainment(c);
    html += '<tr class="crow" data-action="open-campaign" data-id="' + c.id + '">' +
      '<td><strong>' + esc(c.name) + '</strong><div class="small muted">' + esc(c.brand) + '</div></td>' +
      '<td><span class="pill ' + statusPillClass(c.status) + '">' + esc(c.status) + '</span></td>' +
      '<td class="small muted">' + fmtDate(c.startDate) + ' – ' + fmtDate(c.endDate) + '</td>' +
      '<td class="money">' + money(num(c.revenue)) + '</td>' +
      '<td><div class="att-cell"><div class="bar' + (burnPct > 1 ? ' over' : '') + '" style="flex:1;"><div style="width:' + Math.min(burnPct*100,100) + '%;"></div></div>' +
        '<span class="small money muted">' + money(sp) + (b ? ' / ' + money(b) : '') + '</span></div></td>' +
      '<td class="money ' + (m < 0 ? 'neg' : '') + '">' + pct(m) + '</td>' +
      '<td class="small">' + posted + ' / ' + c.deliverables.length + ' posted</td>' +
      '<td>' + (isFinite(att) ? '<div class="att-cell"><div class="bar" style="flex:1;"><div style="width:' + Math.min(att*100,100) + '%;"></div></div><span class="small muted">' + pct(att) + '</span></div>' : '<span class="muted small">—</span>') + '</td>' +
      '<td class="small">' + (od ? deadlinePill(od.date, false) + ' ' + esc(od.title) : nxt ? deadlinePill(nxt.date, false) + ' ' + esc(nxt.title) : '<span class="muted">—</span>') + '</td>' +
    '</tr>';
  });
  html += '</tbody></table></div>';

  /* attention + upcoming */
  var overdueItems = allItems.filter(function(it){ return !it.done && it.date && daysUntil(it.date) < 0; });
  var upcoming = allItems.filter(function(it){ var d = it.date ? daysUntil(it.date) : null; return !it.done && d !== null && d >= 0 && d <= 14; });
  html += '<div class="grid2">' +
    '<div class="card"><h2>Needs attention</h2>' + (overdueItems.length ? overdueItems.map(tlRow).join('') : '<div class="empty">Nothing overdue. 🎉</div>') + '</div>' +
    '<div class="card"><h2>Next 14 days</h2>' + (upcoming.length ? upcoming.map(tlRow).join('') : '<div class="empty">No deadlines in the next two weeks.</div>') + '</div>' +
  '</div>';
  return html;

  function kpi(label, value, sub){
    return '<div class="kpi"><div class="label">' + label + '</div><div class="value">' + value + '</div><div class="sub">' + sub + '</div></div>';
  }
  function tlRow(it){
    return '<div class="tl-item" style="cursor:pointer;" data-action="open-campaign" data-id="' + it.campaign.id + '">' +
      '<span class="tl-date">' + fmtDate(it.date) + '</span>' + deadlinePill(it.date, it.done) +
      '<span style="flex:1;">' + esc(it.title) + '</span>' +
      '<span class="small muted">' + esc(it.campaign.name) + '</span></div>';
  }
}

/* ----- campaign detail ----- */

function renderCampaign(c){
  var tab = view.tab || 'money';
  var html = '<div class="card" style="margin-bottom:14px;">' +
    '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">' +
      '<input class="inline-edit" style="font-size:18px;font-weight:600;flex:1;min-width:200px;" value="' + esc(c.name) + '" data-cfield="name" data-cid="' + c.id + '" placeholder="Campaign name">' +
      '<select data-cfield="status" data-cid="' + c.id + '">' + options(CAMP_STATUSES, c.status) + '</select>' +
      '<button class="danger-ghost" data-action="del-campaign" data-id="' + c.id + '">Delete</button>' +
    '</div>' +
    '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px;">' +
      '<input class="inline-edit" value="' + esc(c.brand) + '" data-cfield="brand" data-cid="' + c.id + '" placeholder="Brand / client" style="min-width:160px;">' +
      '<label class="small muted">Start <input type="date" value="' + esc(c.startDate) + '" data-cfield="startDate" data-cid="' + c.id + '"></label>' +
      '<label class="small muted">End <input type="date" value="' + esc(c.endDate) + '" data-cfield="endDate" data-cid="' + c.id + '"></label>' +
    '</div>' +
  '</div>';

  html += '<div class="tabs">' +
    tabBtn('money', 'Budget & targets') +
    tabBtn('deliverables', 'Deliverables & comments (' + c.deliverables.length + ')') +
    tabBtn('timeline', 'Deadlines') +
    tabBtn('notes', 'Notes & details') +
  '</div>';

  if (tab === 'money') html += renderMoney(c);
  else if (tab === 'deliverables') html += renderDeliverables(c);
  else if (tab === 'timeline') html += renderTimeline(c);

}

function renderMoney(c){
  var sp = totalCosts(c), prof = profit(c), m = margin(c), b = num(c.budget);
  var html = '<div class="kpis">' +
    '<div class="kpi"><div class="label">Revenue (fee from brand)</div><input type="number" min="0" step="100" value="' + num(c.revenue) + '" data-cfield="revenue" data-cid="' + c.id + '" style="width:100%;font-size:16px;font-weight:600;"></div>' +
    '<div class="kpi"><div class="label">Cost budget</div><input type="number" min="0" step="100" value="' + b + '" data-cfield="budget" data-cid="' + c.id + '" style="width:100%;font-size:16px;font-weight:600;"></div>' +
    '<div class="kpi"><div class="label">Spend</div><div class="value money">' + money(sp) + '</div><div class="sub">' + (b > 0 ? money(b - sp) + ' budget remaining' : 'no budget set') + '</div></div>' +
    '<div class="kpi"><div class="label">Profit</div><div class="value money ' + (prof < 0 ? 'neg' : 'pos') + '">' + money(prof) + '</div><div class="sub">' + (isFinite(m) ? pct(m) + ' margin' : 'set revenue to see margin') + '</div></div>' +
  '</div>';
  if (b > 0) {
    var burn = sp/b;
    html += '<div class="card" style="margin-bottom:14px;"><div style="display:flex;align-items:center;gap:10px;">' +
      '<span class="small muted" style="min-width:90px;">Budget burn</span>' +
      '<div class="bar' + (burn > 1 ? ' over' : '') + '" style="flex:1;"><div style="width:' + Math.min(burn*100,100) + '%;"></div></div>' +
      '<span class="small money ' + (burn > 1 ? 'neg' : 'muted') + '">' + pct(burn) + '</span></div>' +
      (burn > 1 ? '<div class="small neg" style="margin-top:6px;">Over budget by ' + money(sp - b) + '.</div>' : '') +
    '</div>';
  }

  /* costs */
  html += '<div class="card" style="margin-bottom:14px;overflow-x:auto;">' +
    '<div class="section-head"><h2>Cost line items</h2><span class="small muted">creator fees, shipping, flights, misc — anything</span><span class="spacer"></span>' +
    '<button data-action="add-cost">+ Add cost</button></div>';
  if (c.costs.length) {
    html += '<table><thead><tr><th style="width:32%;">Item</th><th>Category</th><th>Amount</th><th>Date</th><th style="width:24%;">Notes</th><th></th></tr></thead><tbody>';
    c.costs.forEach(function(x){
      html += '<tr>' +
        '<td><input class="inline-edit" style="width:100%;" value="' + esc(x.label) + '" data-costfield="label" data-costid="' + x.id + '" placeholder="What is this cost?"></td>' +
        '<td><select data-costfield="category" data-costid="' + x.id + '">' + options(COST_CATEGORIES, x.category) + '</select></td>' +
        '<td><input type="number" min="0" step="10" style="width:100px;" value="' + num(x.amount) + '" data-costfield="amount" data-costid="' + x.id + '"></td>' +
        '<td><input type="date" value="' + esc(x.date) + '" data-costfield="date" data-costid="' + x.id + '"></td>' +
        '<td><input class="inline-edit" style="width:100%;" value="' + esc(x.notes) + '" data-costfield="notes" data-costid="' + x.id + '" placeholder="optional"></td>' +
        '<td><button class="danger-ghost" data-action="del-cost" data-id="' + x.id + '">×</button></td></tr>';
    });
    html += '<tr><td class="small muted" colspan="2" style="text-align:right;">Total</td><td class="money" style="font-weight:600;">' + money(sp) + '</td><td colspan="3"></td></tr>';
    html += '</tbody></table>';
  } else {
    html += '<div class="empty">No costs yet — add creator fees, shipping, flights, or anything else.</div>';
  }
  html += '</div>';

  /* targets */
  html += '<div class="card" style="overflow-x:auto;">' +
    '<div class="section-head"><h2>Delivery targets</h2><span class="small muted">update actuals as results come in</span><span class="spacer"></span>' +
    '<button data-action="add-target">+ Add target</button></div>';
  if (c.targets.length) {
    html += '<table><thead><tr><th style="width:30%;">Metric</th><th>Target</th><th>Actual</th><th style="width:30%;">Attainment</th><th></th></tr></thead><tbody>';
    c.targets.forEach(function(t){
      var a = num(t.target) > 0 ? num(t.actual)/num(t.target) : NaN;
      html += '<tr>' +
        '<td><input class="inline-edit" style="width:100%;" value="' + esc(t.metric) + '" data-tgtfield="metric" data-tgtid="' + t.id + '" placeholder="e.g. Total views"></td>' +
        '<td><input type="number" min="0" style="width:110px;" value="' + num(t.target) + '" data-tgtfield="target" data-tgtid="' + t.id + '"></td>' +
        '<td><input type="number" min="0" style="width:110px;" value="' + num(t.actual) + '" data-tgtfield="actual" data-tgtid="' + t.id + '"></td>' +
        '<td>' + (isFinite(a) ? '<div class="att-cell"><div class="bar" style="flex:1;"><div style="width:' + Math.min(a*100,100) + '%;"></div></div><span class="small muted">' + pct(a) + '</span></div>' : '<span class="small muted">set a target</span>') + '</td>' +
        '<td><button class="danger-ghost" data-action="del-target" data-id="' + t.id + '">×</button></td></tr>';
    });
    var att = attainment(c);
    if (isFinite(att)) html += '<tr><td class="small muted" colspan="3" style="text-align:right;">Overall attainment</td><td class="money" style="font-weight:600;">' + pct(att) + '</td><td></td></tr>';
    html += '</tbody></table>';
  } else {
    html += '<div class="empty">No targets yet — add views, engagements, posts, clicks…</div>';
  }
  html += '</div>';
  return html;
}

  var html = '<div class="section-head"><h2 style="margin:0;">Deliverables</h2><span class="spacer"></span>' +

          fld('Creator', '<input value="' + esc(d.creator) + '" data-dlfield="creator" data-dlid="' + d.id + '" placeholder="@handle" style="width:140px;">') +
          fld('Platform', '<select data-dlfield="platform" data-dlid="' + d.id + '">' + options(PLATFORMS, d.platform) + '</select>') +
          fld('Format', '<input value="' + esc(d.type) + '" data-dlfield="type" data-dlid="' + d.id + '" placeholder="Reel, TikTok…" style="width:110px;">') +
          fld('Status', '<select data-dlfield="status" data-dlid="' + d.id + '">' + options(DL_STATUSES, d.status) + '</select>') +

          ctabBtn(d, 'brand',    'Brand (' + counts.brand + ')', ctab) +
          ctabBtn(d, 'creator',  'Creator (' + counts.creator + ')', ctab) +
          ctabBtn(d, 'internal', 'Internal (' + counts.internal + ')', ctab) +
        '</div>';
      var thread = d.comments.filter(function(cm){ return cm.channel === ctab; });
      if (thread.length) {
        thread.forEach(function(cm){
          html += '<div class="comment"><div class="meta"><span class="who">' + esc(cm.author || 'Anonymous') + '</span><span>' + fmtTs(cm.ts) + '</span>' +
            '<button class="danger-ghost" style="margin-left:auto;font-size:11px;padding:0 6px;" data-action="del-comment" data-dlid="' + d.id + '" data-id="' + cm.id + '">×</button></div>' +
            esc(cm.text) + '</div>';

        html += '<div class="empty small">No ' + ctab + ' comments yet on this deliverable.</div>';
      }
      html += '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">' +
        '<input id="cmt-author-' + d.id + '" placeholder="Your name" style="width:120px;" value="' + esc(state.lastAuthor || '') + '">' +
        '<input id="cmt-text-' + d.id + '" placeholder="Write a ' + ctab + ' comment… (Enter to post)" style="flex:1;min-width:200px;" data-action-enter="add-comment" data-dlid="' + d.id + '">' +
        '<button class="primary" data-action="add-comment" data-dlid="' + d.id + '">Post</button>' +

/* ---------------- events ---------------- */

document.addEventListener('click', function(e){
  var stop = e.target.closest('[data-stop]');
  var el = e.target.closest('[data-action]');
  if (!el) return;
  if (stop && !stop.contains(el)) return;
  var a = el.dataset.action;
  var c = view.name === 'campaign' ? campaign(view.id) : null;

  if (a === 'nav-dashboard') { view = { name: 'dashboard' }; render(); }
  else if (a === 'open-new-campaign') { ui.modal = 'new-campaign'; render(); }
  else if (a === 'close-modal') { ui.modal = null; render(); }
  else if (a === 'create-campaign') {
    var name = document.getElementById('nc-name').value.trim();
    var brand = document.getElementById('nc-brand').value.trim();
    var nc = newCampaign(name || 'Untitled campaign', brand);
    state.campaigns.push(nc); save();
    ui.modal = null; view = { name: 'campaign', id: nc.id, tab: 'money' };
    render();
  }
  else if (a === 'open-campaign') { view = { name: 'campaign', id: el.dataset.id, tab: 'money' }; render(); }
  else if (a === 'set-tab') { view.tab = el.dataset.tab; render(); }
  else if (a === 'del-campaign') {
    if (c && confirm('Delete "' + c.name + '" and everything in it? This cannot be undone.')) {
      state.campaigns = state.campaigns.filter(function(x){ return x.id !== c.id; });
      save(); view = { name: 'dashboard' }; render();
    }
  }
  else if (a === 'sample') { loadSample(); }
  else if (a === 'export') {
    var blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    var aEl = document.createElement('a');
    aEl.href = URL.createObjectURL(blob);
    aEl.download = 'campaign-tracker-' + today() + '.json';
    aEl.click(); URL.revokeObjectURL(aEl.href);
  }
  else if (a === 'import') { document.getElementById('import-file').click(); }

  else if (c && a === 'add-cost') { c.costs.push({id:uid(), label:'', category:'Misc', amount:0, date:'', notes:''}); save(); render(); }
  else if (c && a === 'del-cost') { c.costs = c.costs.filter(function(x){ return x.id !== el.dataset.id; }); save(); render(); }
  else if (c && a === 'add-target') { c.targets.push({id:uid(), metric:'', target:0, actual:0}); save(); render(); }
  else if (c && a === 'del-target') { c.targets = c.targets.filter(function(x){ return x.id !== el.dataset.id; }); save(); render(); }

  else if (c && a === 'add-deliverable') { var d = newDeliverable(); c.deliverables.push(d); ui.expanded[d.id] = true; save(); render(); }
  else if (c && a === 'del-deliverable') {
    if (confirm('Delete this deliverable and its comments?')) {
      c.deliverables = c.deliverables.filter(function(x){ return x.id !== el.dataset.id; }); save(); render();
    }
  }
  else if (a === 'toggle-dl') {
    if (e.target.closest('input,select,button,a')) return;
    var id = el.dataset.id;
    ui.expanded[id] = !ui.expanded[id]; render();
  }
  else if (a === 'set-ctab') { ui.commentTab[el.dataset.dlid] = el.dataset.channel; render(); }
  else if (c && a === 'add-comment') {
    var dlid = el.dataset.dlid;
    var dl = c.deliverables.find(function(x){ return x.id === dlid; });
    var author = document.getElementById('cmt-author-' + dlid).value.trim();
    var text = document.getElementById('cmt-text-' + dlid).value.trim();
    if (dl && text) {
      dl.comments.push({ id: uid(), channel: ui.commentTab[dlid] || 'brand', author: author, text: text, ts: Date.now() });
      state.lastAuthor = author; save(); render();
    }
  }
  else if (c && a === 'del-comment') {
    var dl2 = c.deliverables.find(function(x){ return x.id === el.dataset.dlid; });
    if (dl2) { dl2.comments = dl2.comments.filter(function(x){ return x.id !== el.dataset.id; }); save(); render(); }
  }

  else if (c && a === 'add-milestone') {
    var t = document.getElementById('ms-title').value.trim();
    var dt = document.getElementById('ms-date').value;
    if (t) { c.milestones.push({id:uid(), title:t, date:dt, done:false, notes:''}); save(); render(); }
  }
  else if (c && a === 'quick-milestone') {
    var dflt = document.getElementById('ms-date');
    c.milestones.push({id:uid(), title:el.dataset.title, date:(dflt && dflt.value) || today(), done:false, notes:''});
    save(); render();
  }
  else if (c && a === 'del-milestone') { c.milestones = c.milestones.filter(function(x){ return x.id !== el.dataset.id; }); save(); render(); }

  else if (c && a === 'add-cf') { c.customFields.push({id:uid(), label:'', value:''}); save(); render(); }
  else if (c && a === 'del-cf') { c.customFields = c.customFields.filter(function(x){ return x.id !== el.dataset.id; }); save(); render(); }
});

document.addEventListener('change', function(e){
  var el = e.target;
  var c = view.name === 'campaign' ? campaign(view.id) : null;

  if (el.dataset.actionCheck === 'toggle-milestone' && c) {
    var m = c.milestones.find(function(x){ return x.id === el.dataset.id; });
    if (m) { m.done = el.checked; save(); render(); }
    return;
  }
  if (el.dataset.cfield && el.dataset.cid) {
    var cc = campaign(el.dataset.cid);
    if (cc) {
      var f = el.dataset.cfield;
      cc[f] = (f === 'revenue' || f === 'budget') ? num(el.value) : el.value;
      save(); render();
    }
    return;
  }
  if (!c) return;
  if (el.dataset.costfield) {
    var x = c.costs.find(function(i){ return i.id === el.dataset.costid; });
    if (x) { x[el.dataset.costfield] = el.dataset.costfield === 'amount' ? num(el.value) : el.value; save(); render(); }
  } else if (el.dataset.tgtfield) {
    var t = c.targets.find(function(i){ return i.id === el.dataset.tgtid; });
    if (t) { t[el.dataset.tgtfield] = (el.dataset.tgtfield === 'metric') ? el.value : num(el.value); save(); render(); }
  } else if (el.dataset.dlfield) {
    var d = c.deliverables.find(function(i){ return i.id === el.dataset.dlid; });
    if (d) { d[el.dataset.dlfield] = el.value; save(); render(); }
  } else if (el.dataset.cffield) {
    var cf = c.customFields.find(function(i){ return i.id === el.dataset.cfid; });
    if (cf) { cf[el.dataset.cffield] = el.value; save(); }
  }
});

/* live autosave for free notes (no re-render so typing isn't interrupted) */
document.addEventListener('input', function(e){
  var el = e.target;
  if (el.dataset.cfieldLive && el.dataset.cid) {
    var cc = campaign(el.dataset.cid);
    if (cc) { cc[el.dataset.cfieldLive] = el.value; save(); }
  }
});

/* Enter-to-submit on inputs flagged with data-action-enter */
document.addEventListener('keydown', function(e){
  if (e.key !== 'Enter') return;
  var el = e.target;
  if (!el.dataset || !el.dataset.actionEnter) return;
  e.preventDefault();
  var a = el.dataset.actionEnter;
  var btn = document.querySelector('button[data-action="' + a + '"]' + (el.dataset.dlid ? '[data-dlid="' + el.dataset.dlid + '"]' : ''));
  if (btn) btn.click();
});

document.getElementById('import-file').addEventListener('change', function(){
  var f = this.files[0];
  if (!f) return;
  var reader = new FileReader();
  reader.onload = function(){
    try {
      var data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.campaigns)) throw new Error('bad format');
      if (!state.campaigns.length || confirm('Replace your current data with the imported file? Export first if you want a backup.')) {
        state = data; save(); view = { name: 'dashboard' }; render();
      }
    } catch(err) {
      alert('Could not import: that file does not look like a tracker export.');
    }
  };
  reader.readAsText(f);
  this.value = '';
});

render();
})();
</script>
</body>
</html>
